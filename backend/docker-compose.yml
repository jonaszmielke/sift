services:
  db:
    image: docker.io/pgvector/pgvector:pg15
    container_name: sift-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sift}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sift_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sift}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sift_pgdata:
